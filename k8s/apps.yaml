apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  revisionHistoryLimit: 2
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: backend
    spec:
      serviceAccountName: app-service-account
      containers:
        - name: auth-service
          image: finalproject-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: book-order-secrets
                  key: AUTH_DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: book-order-secrets
                  key: JWT_SECRET
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: book-order-config
                  key: JWT_ALGORITHM
            - name: TOKEN_EXPIRE_HOURS
              valueFrom:
                configMapKeyRef:
                  name: book-order-config
                  key: TOKEN_EXPIRE_HOURS
            - name: CONSUL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: book-order-config
                  key: CONSUL_ENABLED
          readinessProbe:
            httpGet:
              path: /auth/health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth/health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30081
---
